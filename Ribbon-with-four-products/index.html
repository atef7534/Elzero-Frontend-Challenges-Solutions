<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ribbon with four products</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main id="products">
      <h1 class="title">Featured Products</h1>
      <div class="products-list">
        <div class="product">
          <img src="./images/bear.jpg" alt="Bear photo" />
          <div class="wrapper">
            <h2 class="product-title">Dummy Variable Product</h2>
            <h3 class="price">$19.99</h3>
          </div>
        </div>
        <div class="product on-sale">
          <img src="./images/cup.jpg" alt="Bear photo" />
          <div class="wrapper">
            <h2 class="product-title">Dummy Sale Product</h2>
            <h3 class="price">
              <span class="before">$19.99</span>
              <span class="instead">$14.99</span>
            </h3>
          </div>
        </div>
        <div class="product">
          <img src="./images/panda.jpg" alt="Bear photo" />
          <div class="wrapper">
            <h2 class="product-title">Dummy Simple Product</h2>
            <h3 class="price">$19.99</h3>
          </div>
        </div>
        <div class="product">
          <img src="./images/warmgreyboucle-106.webp" alt="Bear photo" />
          <div class="wrapper">
            <h2 class="product-title">Out Of Stock Product</h2>
            <h3 class="price">$19.99</h3>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
