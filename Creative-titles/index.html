<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Titles</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <h2 id="head-1">Circle</h2>
    <h3 class="blue circle">Creative Title</h3>
    <h3 class="red circle">Creative Title</h3>
    <h3 class="green circle">Creative Title</h3>
    <h3 class="orange circle">Creative Title</h3>

    <h2 id="head-1">Box</h2>

    <h3 class="red square">Creative Title</h3>
    <h3 class="green square">Creative Title</h3>
    <h3 class="orange square">Creative Title</h3>

    <h2 id="head-1">Triangle Up</h2>
    <h3 class="blue upper-triangle">Creative Title</h3>
    <h3 class="red upper-triangle">Creative Title</h3>
    <h3 class="green upper-triangle">Creative Title</h3>
    <h3 class="orange upper-triangle">Creative Title</h3>

    <h2 id="head-1">Triangle Down</h2>
    <h3 class="blue down-triangle">Creative Title</h3>
    <h3 class="red down-triangle">Creative Title</h3>
    <h3 class="green down-triangle">Creative Title</h3>
    <h3 class="orange down-triangle special">Creative Title</h3>

</html>
